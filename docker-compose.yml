services:
  db:
    image: postgres:15
    container_name: zoho_analytics_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: zoho_analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zoho_analytics"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: zoho_analytics_backend
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CORS_ORIGINS: http://localhost:5173,http://localhost,http://127.0.0.1
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: zoho_analytics_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

  metabase:
    image: metabase/metabase:latest
    container_name: zoho_analytics_metabase
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
    volumes:
      - metabase_data:/metabase-data

volumes:
  postgres_data:
  metabase_data:
